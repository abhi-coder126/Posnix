<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Posnix Billing &amp; POS Solutions Logo</title>
  <desc id="desc">Text-only Posnix logo without icon</desc>
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9BE34B"/>
      <stop offset="0.48" stop-color="#62BE34"/>
      <stop offset="1" stop-color="#2E8F23"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="transparent"/>

  <g filter="url(#softShadow)">
    <text x="600" y="185" text-anchor="middle"
          font-family="Arial Black, Montserrat, Poppins, Arial, sans-serif"
          font-size="142" font-weight="900" letter-spacing="-7">
      <tspan fill="#FFFFFF">Pos</tspan><tspan fill="url(#greenGrad)">nix</tspan>
    </text>
  </g>

  <text x="600" y="252" text-anchor="middle"
        font-family="Montserrat, Poppins, Arial, sans-serif"
        font-size="34" font-weight="800" letter-spacing="10"
        fill="#AEB6C2">BILLING &amp; POS SOLUTIONS</text>
</svg>
